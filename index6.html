<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Maze 3D: Kinetic Escape</title>
    <style>
        :root {
            --blood-red: #ff0000;
            --deep-red: #4d0000;
            --neon-gold: #ffd700;
            --interface-blue: rgba(0, 100, 255, 0.2);
        }

        body {
            margin: 0; background: #000; color: white;
            font-family: 'Orbitron', "Microsoft JhengHei", sans-serif;
            overflow: hidden;
        }

        /* 3D 畫布 */
        #render-canvas {
            width: 100vw; height: 100vh; display: block;
        }

        /* HUD 狀態列 */
        #hud {
            position: absolute; top: 0; width: 100%; display: flex;
            justify-content: space-between; padding: 20px; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
        }

        .stat { font-size: 1.2em; text-shadow: 0 0 10px var(--blood-red); }
        .val { color: var(--neon-gold); font-weight: bold; font-size: 1.5em; }

        /* 題目顯示區 */
        #question-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -120%);
            width: 85%; max-width: 700px; text-align: center;
            background: var(--interface-blue); border: 1px solid rgba(0, 150, 255, 0.5);
            padding: 25px; border-radius: 15px; backdrop-filter: blur(8px);
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.3);
            transition: opacity 0.5s;
        }

        .q-text { font-size: 1.3em; line-height: 1.6; margin-bottom: 20px; }

        /* 岔路選擇按鈕 */
        #choice-grid {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; width: 90%; justify-content: center;
        }

        .path-btn {
            background: rgba(0,0,0,0.8); border: 2px solid var(--neon-gold);
            color: white; padding: 15px 25px; cursor: pointer; border-radius: 8px;
            font-size: 1.1em; transition: all 0.3s; flex: 1; max-width: 200px;
        }
        .path-btn:hover { background: var(--neon-gold); color: black; transform: translateY(-5px); }
        .path-btn:active { transform: scale(0.95); }

        /* 撞牆濾鏡 */
        #crash-filter {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: red; opacity: 0; pointer-events: none; z-index: 50;
        }

        @keyframes crash-flash {
            0% { opacity: 0.7; }
            100% { opacity: 0; }
        }

        /* 啟動選單 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="start-screen">

    <p style="color: #666;">第一人稱・動態逃生・知識導向</p>
    <button onclick="initGame()" style="margin-top:40px; padding:20px 60px; font-size:1.5em; background:none; border:2px solid var(--blood-red); color:white; cursor:pointer;">啟動同步程序</button>
</div>

<div id="crash-filter"></div>

<div id="hud">
    <div class="stat">VITALITY: <span id="hp" class="val">100</span></div>
    <div class="stat">PROGRESS: <span id="progress" class="val">0/20</span></div>
</div>

<canvas id="render-canvas"></canvas>

<div id="question-overlay">
    <div id="q-content" class="q-text">系統掃描中...</div>
</div>

<div id="choice-grid"></div>

        { q: "疫苗主要作用？", a: ["治療", "產生抗體", "增肌"], correct: 1 },
        { q: "抗生素治療哪種感染？", a: ["病毒", "細菌", "過敏"], correct: 1 },
        { q: "建議睡眠時間？", a: ["4-5小時", "7-9小時", "12小時"], correct: 1 },
        { q: "藍光影響？", a: ["食慾", "睡眠品質", "聽力"], correct: 1 },
        { q: "洗手正確步驟？", a: ["濕搓沖捧擦", "濕沖擦", "沖脫泡蓋"], correct: 0 },
        { q: "預防蛀牙成分？", a: ["氟", "木醣醇", "薄荷"], correct: 0 },
        { q: "抽菸增加何種癌風險？", a: ["肺癌", "胃癌", "皮癌"], correct: 0 },
        { q: "PM2.5 指的是直徑？", a: ["重金屬", "懸浮微粒", "氣體"], correct: 1 },
        // 運動復健 (61-80)

        { q: "肯定特質？", a: ["自戀", "自尊", "自大"], correct: 1 },
        { q: "親友過世歷程？", a: ["叛逆", "哀悼歷程", "更年期"], correct: 1 }

    // --- 遊戲引擎設定 ---
    let state = {
        hp: 100, step: 0, goal: 20, active: false,
        cameraZ: 0, targetZ: 0, 
        currentQ: null, isMoving: false,
        angle: 0, targetAngle: 0
    };

    const canvas = document.getElementById('render-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function initGame() {
        document.getElementById('start-screen').style.display = 'none';
        state.active = true;
        animate();
        nextQuestion();
    }

    // --- 3D 繪製邏輯 ---
    function animate() {
        if (!state.active) return;

        // 平滑插值相機
        state.cameraZ += (state.targetZ - state.cameraZ) * 0.05;
        state.angle += (state.targetAngle - state.angle) * 0.1;

        const w = canvas.width, h = canvas.height;
        ctx.fillStyle = '#050000';
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.translate(w / 2, h / 2);
        ctx.rotate(state.angle);

        // 繪製隧道線條
        for (let i = 20; i > 0; i--) {
            let z = (i * 200) - (state.cameraZ % 200);
            let size = 150000 / z;
            let alpha = 1 - (z / 4000);
            
            ctx.strokeStyle = `rgba(0, 150, 255, ${alpha})`;
            ctx.lineWidth = 2;
            
            // 繪製矩形隧道牆
            ctx.strokeRect(-size/2, -size/2, size, size);
            
            // 連接線 (路徑感)
            ctx.beginPath();
            ctx.moveTo(-size/2, -size/2); ctx.lineTo(-size*0.8, -size*0.8);
            ctx.stroke();
        }
        ctx.restore();

        requestAnimationFrame(animate);
    }

    function nextQuestion() {
        if (!state.active) return;
        state.isMoving = false;
        
        const q = rawQuestions[Math.floor(Math.random() * rawQuestions.length)];
        state.currentQ = q;

        document.getElementById('q-content').innerText = q.q;
        const grid = document.getElementById('choice-grid');
        grid.innerHTML = '';

        const directions = ["左轉", "直行", "右轉"];
        q.a.forEach((ans, i) => {
            const btn = document.createElement('button');
            btn.className = 'path-btn';
            btn.innerText = `${directions[i]}：${ans}`;
            btn.onclick = () => makeChoice(i);
            grid.appendChild(btn);
        });
    }

    function makeChoice(idx) {
        if (state.isMoving) return;
        state.isMoving = true;

        if (idx === state.currentQ.correct) {
            // 答對：前進
            state.targetZ += 600;
            state.step++;
            updateUI();
            
            if (state.step >= state.goal) {
                setTimeout(() => endGame(true), 1500);
            } else {
                setTimeout(nextQuestion, 1500);
            }
        } else {
            // 答錯：撞牆轉彎
            state.hp -= 20;
            state.targetAngle = (idx === 0) ? 0.5 : (idx === 2) ? -0.5 : 0.1; // 模擬轉向錯誤方向
            
            setTimeout(() => {
                triggerCrash();
                state.targetAngle = 0; // 彈回正面
                updateUI();
                if (state.hp <= 0) {
                    endGame(false);
                } else {
                    nextQuestion();
                }
            }, 600);
        }
    }

    function triggerCrash() {
        const filter = document.getElementById('crash-filter');
        filter.style.animation = 'none';
        filter.offsetHeight; // reflow
        filter.style.animation = 'crash-flash 0.8s forwards';
        
        // 提示正確答案
        const hudMsg = document.createElement('div');
        hudMsg.style.cssText = "position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); color:white; font-size:2em; text-shadow:0 0 10px red;";
        hudMsg.innerText = "❌ 撞擊！正確答案：" + state.currentQ.a[state.currentQ.correct];
        document.body.appendChild(hudMsg);
        setTimeout(() => hudMsg.remove(), 2000);
    }

    function updateUI() {
        document.getElementById('hp').innerText = state.hp;
        document.getElementById('progress').innerText = `${state.step}/${state.goal}`;
    }

    function endGame(win) {
        state.active = false;
        const screen = document.getElementById('start-screen');
        screen.style.display = 'flex';
        screen.innerHTML = win ? 
            `<h1 style="color:var(--neon-gold)">逃生成功</h1><p>系統狀態：健康</p><button onclick="location.reload()">再試一次</button>` :
            `<h1 style="color:var(--blood-red)">致命損壞</h1><p>正確解答是逃生的唯一路徑。</p><button onclick="location.reload()">重新啟動</button>`;
    }
</script>
